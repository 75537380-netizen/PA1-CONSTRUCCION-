{% extends "base.html" %}
{% block titulo %}Iniciar Sesion{% endblock %}
{% block contenido %}
<div class="auth-surface">
    <div class="text-center mb-4">
        <i class="bi bi-check2-square display-5 mb-2 d-block" style="color:var(--accent);"></i>
        <h4 class="mb-1">Organizador AI</h4>
        <p class="text-muted" style="font-size:0.85rem;">Inicia sesion para continuar</p>
    </div>

    <form method="POST" class="vstack gap-3" id="login-form" novalidate>
        <input type="hidden" name="next" value="{{ request.args.get('next', '') }}" />

        <div>
            <label class="form-label" for="nombre_usuario">Usuario</label>
            <div class="input-group">
                <span class="input-group-text" style="background:rgba(9,14,28,0.9);border-color:var(--line-soft);color:var(--text-soft);">
                    <i class="bi bi-person"></i>
                </span>
                <input
                    type="text"
                    id="nombre_usuario"
                    name="nombre_usuario"
                    class="form-control"
                    placeholder="Tu nombre de usuario"
                    required
                    autofocus
                    autocomplete="username"
                    style="border-left:none;"
                />
            </div>
        </div>

        <div>
            <label class="form-label" for="contrasena">Contrasena</label>
            <div class="input-group">
                <span class="input-group-text" style="background:rgba(9,14,28,0.9);border-color:var(--line-soft);color:var(--text-soft);">
                    <i class="bi bi-lock"></i>
                </span>
                <input
                    type="password"
                    id="contrasena"
                    name="contrasena"
                    class="form-control"
                    placeholder="Tu contrasena"
                    required
                    autocomplete="current-password"
                    style="border-left:none;border-right:none;"
                />
                <button
                    type="button"
                    class="input-group-text"
                    id="toggle-password"
                    title="Mostrar/ocultar contrasena"
                    style="background:rgba(9,14,28,0.9);border-color:var(--line-soft);color:var(--text-soft);cursor:pointer;"
                >
                    <i class="bi bi-eye" id="toggle-icon"></i>
                </button>
            </div>
        </div>

        <div class="d-flex align-items-center justify-content-between">
            <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" name="recordarme" id="recordarme" value="1" />
                <label class="form-check-label" for="recordarme" style="font-size:0.85rem;color:var(--text-soft);">
                    Recordarme
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 mt-1" id="btn-ingresar">
            <span id="btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</span>
            <span id="btn-spinner" class="d-none">
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Verificando...
            </span>
        </button>
    </form>

    <hr style="border-color:var(--line-soft);margin:1.5rem 0;">
    <p class="text-center text-muted mb-0" style="font-size:0.85rem;">
        No tienes cuenta? <a href="{{ url_for('registro') }}">Registrate aqui</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Mostrar / ocultar contrasena
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('contrasena');
    const toggleIcon = document.getElementById('toggle-icon');

    toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        toggleIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    // Estado de carga al enviar el formulario
    document.getElementById('login-form').addEventListener('submit', function () {
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const btn = document.getElementById('btn-ingresar');

        btn.disabled = true;
        btnText.classList.add('d-none');
        btnSpinner.classList.remove('d-none');
    });
</script>
{% endblock %}
