{% extends "base.html" %}
{% block titulo %}Iniciar Sesion{% endblock %}
{% block contenido %}
<div class="auth-surface">
    <div class="text-center mb-4">
        <i class="bi bi-check2-square display-5 mb-2 d-block" style="color:var(--accent);"></i>
        <h4 class="mb-1">Organizador AI</h4>
        <p class="text-muted" style="font-size:0.85rem;">Inicia sesion para continuar</p>
    </div>

    <form method="POST" class="vstack gap-3">
        <div>
            <label class="form-label">Usuario</label>
            <input type="text" name="nombre_usuario" class="form-control" required autofocus autocomplete="username" />
        </div>
        <div>
            <label class="form-label">Contrasena</label>
            <input type="password" name="contrasena" class="form-control" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 mt-1">
            Ingresar
        </button>
    </form>

    <hr style="border-color:var(--line-soft);margin:1.5rem 0;">
    <p class="text-center text-muted mb-0" style="font-size:0.85rem;">
        No tienes cuenta? <a href="{{ url_for('registro') }}">Registrate aqui</a>
    </p>
</div>
{% endblock %}
