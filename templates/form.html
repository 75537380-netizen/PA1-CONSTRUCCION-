{% extends "base.html" %}
{% block titulo %}{{ accion }} Tarea{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="main-surface">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <div class="section-kicker mb-0">{{ 'Nueva' if accion == 'Crear' else 'Editar' }}</div>
                    <h4 class="mb-0">{{ accion }} Tarea</h4>
                </div>
            </div>
            <form method="POST">
                {% include "_tarea_form_fields.html" %}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save me-1"></i>{{ accion }}
                    </button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
