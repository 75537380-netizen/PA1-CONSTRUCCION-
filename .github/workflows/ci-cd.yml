name: CI-CD

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "hotfix/**"
      - "release/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  ci:
    name: Integracion continua
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar sintaxis Python
        run: |
          python -m py_compile app.py database.py models.py

      - name: Verificar estructura del proyecto
        run: |
          test -f app.py
          test -f database.py
          test -f models.py
          test -d templates

      - name: Validar importaciones clave
        run: |
          python -c "import flask, mysql.connector, anthropic, dotenv"

  cd:
    name: Entrega continua
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Empaquetar proyecto
        run: |
          mkdir -p dist
          zip -r dist/pa1-construccion.zip app.py database.py models.py requirements.txt README.md init_db.sql templates .github

      - name: Subir artefacto de entrega
        uses: actions/upload-artifact@v4
        with:
          name: pa1-construccion-build
          path: dist/pa1-construccion.zip
          if-no-files-found: error
